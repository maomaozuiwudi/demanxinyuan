<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>科学宝典 · 管理面板</title>
<style>
:root {
  --bg:#1a0a0a; --card:#2a1215; --gold:#c9a96e; --gold-light:#e0d0a0;
  --text:#d4c5b0; --text-dim:#a09080; --text-light:#f0e8d8; --border:#3a2820;
  --green:#4a8; --red:#c0392b;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: "Microsoft YaHei","PingFang SC",sans-serif;
  min-height: 100vh;
  padding: 16px;
}
.header {
  text-align: center;
  padding: 20px 0 16px;
}
.header h1 { font-size: 1.4em; color: var(--gold-light); letter-spacing: 0.1em; font-weight: normal; }
.header .sub { color: var(--text-dim); font-size: 0.75em; margin-top: 4px; }

.config-bar {
  display: flex; gap: 8px;
  max-width: 480px; margin: 0 auto 16px;
}
.config-bar input {
  flex:1; padding: 8px 12px;
  background:#1a0d0f; border:1px solid var(--border);
  border-radius:4px; color:var(--text-light); font-size:0.8em; font-family:inherit;
}
.config-bar button {
  padding: 8px 16px;
  background: linear-gradient(135deg, #8b1a1a, #6b1010);
  color: var(--gold-light); border:1px solid var(--gold);
  border-radius:4px; cursor:pointer; font-family:inherit; font-size:0.8em;
}

.status-bar {
  text-align: center; padding: 4px 0 12px;
  color: var(--text-dim); font-size: 0.75em;
}
.status-bar .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
.dot-live { background: var(--green); animation: pulse 2s infinite; }
.dot-dead { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.session-list { max-width: 480px; margin: 0 auto; }
.session-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: all 0.3s;
}
.session-card.just-unlocked {
  border-color: var(--green);
  background: #1a2a1a;
}
.session-info { flex: 1; min-width: 0; }
.session-code {
  font-size: 1.1em; color: var(--gold-light);
  font-family: monospace; letter-spacing: 0.1em;
}
.session-detail {
  font-size: 0.8em; color: var(--text-dim);
  margin-top: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.session-time { font-size: 0.7em; color: var(--text-dim); margin-top: 2px; }
.session-action { flex-shrink: 0; }
.btn-unlock {
  padding: 10px 20px;
  font-size: 0.9em;
  background: linear-gradient(135deg, #8b1a1a, #6b1010);
  color: var(--gold-light);
  border: 1px solid var(--gold);
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
  transition: all 0.3s;
}
.btn-unlock:active { transform: scale(0.95); }
.btn-unlock.unlocked {
  background: #2a4a2a; border-color: var(--green); color: var(--green);
}

.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text-dim);
}
.loading { text-align: center; padding: 40px; color: var(--text-dim); }

.sound-toggle {
  position: fixed; top: 12px; right: 12px;
  padding: 6px 12px;
  background: #1a0d0f; border:1px solid var(--border);
  border-radius: 4px; color: var(--text-dim); font-size: 0.75em;
  cursor: pointer; font-family: inherit;
  z-index: 10;
}

/* 刷新按钮 */
.refresh-btn {
  display: inline-block;
  padding: 6px 14px;
  background: linear-gradient(135deg, #5a3a1a, #4a2a10);
  color: var(--gold-light);
  border: 1px solid var(--gold);
  border-radius: 4px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.75em;
  margin-left: 8px;
  transition: all 0.3s;
  vertical-align: middle;
}
.refresh-btn:active { transform: scale(0.9); }
.refresh-btn.spinning {
  pointer-events: none;
  opacity: 0.7;
}
.refresh-btn .spin-icon {
  display: inline-block;
  transition: transform 0.3s;
}
.refresh-btn.spinning .spin-icon {
  animation: spin 0.8s linear infinite;
}
@keyframes spin { 100% { transform: rotate(360deg); } }

.filter-bar {
  display: flex; gap: 8px;
  max-width: 480px; margin: 0 auto 12px;
  align-items: center;
}
.filter-bar select {
  flex:1; padding: 8px 12px;
  background:#1a0d0f; border:1px solid var(--border);
  border-radius:4px; color:var(--text-light); font-size:0.8em; font-family:inherit;
}
.filter-bar label {
  color: var(--text-dim); font-size: 0.75em; white-space: nowrap;
}
.last-update {
  font-size: 0.65em;
  color: var(--text-dim);
  text-align: center;
  margin-top: 4px;
  min-height: 1.2em;
}
</style>
</head>
<body>

<button class="sound-toggle" onclick="toggleSound()" id="soundBtn">🔇 声音关</button>

<div class="header">
  <h1>🔮 解锁面板 <button class="refresh-btn" onclick="manualRefresh()" id="refreshBtn"><span class="spin-icon">↻</span> 刷新</button></h1>
  <div class="sub">摊主端 · 收到付款后点解锁</div>
  <div class="last-update" id="lastUpdate"></div>
</div>

<div class="config-bar" id="configBar">
  <input type="text" id="supabaseUrl" placeholder="Supabase URL">
  <input type="text" id="supabaseKey" placeholder="anon key">
  <button onclick="initSupabase()">连接</button>
</div>

<div class="status-bar" id="statusBar" style="display:none">
  <span class="dot" id="statusDot"></span>
  <span id="statusText">等待连接…</span>
</div>

<div class="filter-bar">
  <label>服务:</label>
  <select id="serviceFilter" onchange="loadSessions()">
    <option value="all">全部服务</option>
    <option value="bazi">🔮 八字批命</option>
    <option value="tarot">🃏 塔罗占卜</option>
    <option value="dream">🌙 周公解梦</option>
    <option value="word">📝 姓名测字</option>
    <option value="phone">📱 手机号吉凶</option>
  </select>
</div>

<div class="session-list" id="sessionList">
  <div class="loading" id="loadingMsg">请先填入 Supabase 配置并连接</div>
</div>

<script>
function esc(s) {
  s = String(s || '');
  s = s.replace(/&/g, '&amp;');
  s = s.replace(/</g, '&lt;');
  s = s.replace(/>/g, '&gt;');
  s = s.replace(/"/g, '&quot;');
  return s;
}

// ── Supabase REST API（无需 SDK）──
var SB_URL = 'https://qvxqapgeeldfzedpcihd.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF2eHFhcGdlZWxkZnplZHBjaWhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzgxNDYsImV4cCI6MjA5NzAxNDE0Nn0.isNFaHKFTLZc6Im2obBKawczsooeImVkI4lfhmUfTfw';

function sbFetch(path, opts) {
  opts = opts || {};
  opts.headers = Object.assign({
    'apikey': SB_KEY,
    'Authorization': 'Bearer ' + SB_KEY,
    'Content-Type': 'application/json',
  }, opts.headers || {});
  return fetch(SB_URL + path, opts);
}

var supabase = { connected: true };
var soundEnabled = true, knownSessions = {}, beepOk = false;
var urlCode = null;
var _lastRefreshTime = null;

// 手动刷新
function manualRefresh() {
  var btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  loadSessions();
  // 最多转2秒自动停
  setTimeout(function(){ btn.classList.remove('spinning'); }, 2000);
}

// Parse URL params for ?code=XXXXXX
try {
  urlCode = new URLSearchParams(window.location.search).get('code');
} catch(_) {}

var localMode = false, localSessionLoaded = null;

document.addEventListener('click', function(){ beepOk = true; }, {once:true});

// 自动连接
(function autoConnect() {
  document.getElementById('configBar').style.display = 'none';
  document.getElementById('statusBar').style.display = '';
  document.getElementById('statusDot').className = 'dot dot-live';
  document.getElementById('statusText').textContent = '已连接';
  loadSessions();
  setInterval(loadSessions, 5000);
  if (urlCode) setTimeout(function(){ scrollToCode(urlCode); }, 1500);
})();

// ── 加载订单列表 ──
function loadSessions() {
  var filter = document.getElementById('serviceFilter').value;
  var url = '/rest/v1/fortune_sessions?order=created_at.desc&limit=500';
  if (filter !== 'all') {
    url += '&service_type=eq.' + encodeURIComponent(filter);
  }
  sbFetch(url)
    .then(function(r){
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(rows){
      renderSessions(rows);
      _lastRefreshTime = new Date();
      var el = document.getElementById('lastUpdate');
      if (el) el.textContent = '最后更新: ' + _lastRefreshTime.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
      document.getElementById('statusDot').className = 'dot dot-live';
      document.getElementById('statusText').textContent = '已连接';
    })
    .catch(function(e){
      // 如果带filter失败（可能是service_type字段不存在），回退到全部
      if (filter !== 'all') {
        console.warn('按类型查询失败，回退到全部:', e.message);
        document.getElementById('serviceFilter').value = 'all';
        loadSessions();
      } else {
        document.getElementById('statusDot').className = 'dot dot-dead';
        document.getElementById('statusText').textContent = '连接失败';
      }
    });
}

function renderSessions(sessions) {
  var list = document.getElementById('sessionList');
  if (!sessions || sessions.length === 0) {
    list.innerHTML = '<div class="empty-state"><div style="font-size:3em">🈳</div><div>暂无排盘请求</div><div style="font-size:0.75em;color:var(--border);margin-top:6px">顾客扫码排盘后会出现在这里</div></div>';
    return;
  }

  var frag = document.createDocumentFragment();
  var pending = sessions.filter(function(s){ return s.status === 'pending'; });
  var paid = sessions.filter(function(s){ return s.status === 'paid'; });
  var unlocked = sessions.filter(function(s){ return s.status === 'unlocked'; });

  // 新订单提示音
  pending.concat(paid).forEach(function(s){
    if (!knownSessions[s.session_code] && soundEnabled) playBeep();
    knownSessions[s.session_code] = s.status;
  });

  pending.forEach(function(s){
    var card = document.createElement('div'); card.className = 'session-card'; card.id = 'card_' + s.session_code;
    var birth = s.birth_json || {};
    var teaser = s.teaser || {};
    var birthStr = birth.year ? birth.year + '-' + birth.month + '-' + birth.day : '?';
    if (s.code && !s.session_code) s.session_code = s.code;
    var iconMap = {'tarot':'🃏','dream':'🌙','word':'📝','phone':'📱'};
    var serviceIcon = iconMap[s.service_type] || '🔮';
    card.innerHTML =
      '<div class="session-info">' +
        '<div class="session-code">' + esc(s.session_code) + '</div>' +
        '<div class="session-detail">' + serviceIcon + ' ' + esc(s.name||'匿名') + ' · ' + esc(birthStr) + ' · ' + esc(teaser.dm||'?') + '</div>' +
        '<div class="session-detail">' + esc(teaser.pattern||'') + ' · 喜' + esc(teaser.fav||'?') + '</div>' +
        '<div class="session-time">' + getElapsed(s.created_at) + '</div>' +
      '</div>' +
      '<div class="session-action"><button class="btn-unlock" onclick="doUnlock(\'' + esc(s.session_code) + '\', this)">🔓 解锁</button></div>';
    frag.appendChild(card);
  });

  // 已付款待解锁（paid）
  paid.forEach(function(s){
    var card = document.createElement('div'); card.className = 'session-card'; card.id = 'card_' + s.session_code;
    card.style.borderColor = '#c9a040';
    var birth = s.birth_json || {};
    var teaser = s.teaser || {};
    var birthStr = birth.year ? birth.year + '-' + birth.month + '-' + birth.day : '?';
    if (s.code && !s.session_code) s.session_code = s.code;
    var iconMap = {'tarot':'🃏','dream':'🌙','word':'📝','phone':'📱'};
    var serviceIcon = iconMap[s.service_type] || '🔮';
    card.innerHTML =
      '<div class="session-info">' +
        '<div class="session-code" style="color:#e0b040">' + esc(s.session_code) + ' 💰</div>' +
        '<div class="session-detail">' + serviceIcon + ' ' + esc(s.name||'匿名') + ' · ' + esc(birthStr) + ' · ' + esc(teaser.dm||'?') + '</div>' +
        '<div class="session-detail" style="color:#e0b040;font-size:0.7em">已付款 · 待解锁</div>' +
      '</div>' +
      '<div class="session-action"><button class="btn-unlock" onclick="doUnlock(\'' + esc(s.session_code) + '\', this)">🔓 解锁</button></div>';
    frag.appendChild(card);
  });

  if (unlocked.length > 0) {
    var sep = document.createElement('div');
    sep.style.cssText = 'color:var(--text-dim);font-size:0.8em;margin:16px 0 8px;';
    sep.textContent = '已解锁 (' + unlocked.length + ')';
    frag.appendChild(sep);
    unlocked.forEach(function(s){
      var card = document.createElement('div'); card.className = 'session-card'; card.style.opacity = '0.5';
      var teaser = s.teaser || {};
      if (s.code && !s.session_code) s.session_code = s.code;
      var iconMap = {'tarot':'🃏','dream':'🌙','word':'📝','phone':'📱'};
      var serviceIcon = iconMap[s.service_type] || '🔮';
      card.innerHTML =
        '<div class="session-info">' +
          '<div class="session-code" style="color:var(--green)">' + esc(s.session_code) + ' ✓</div>' +
          '<div class="session-detail">' + serviceIcon + ' ' + esc(s.name||'匿名') + ' · ' + esc(teaser.dm||'?') + '</div>' +
        '</div>' +
        '<div class="session-action"><button class="btn-unlock unlocked" disabled>已解锁</button></div>';
      frag.appendChild(card);
    });
  }

  list.replaceChildren(frag);
}

function getElapsed(ts) {
  if (!ts) return '';
  var diff = (Date.now() - new Date(ts).getTime()) / 1000;
  if (diff < 60) return '刚刚';
  if (diff < 3600) return Math.floor(diff/60) + '分钟前';
  return Math.floor(diff/3600) + '小时前';
}

function doUnlock(code, btn) {
  if (!code) return;
  btn.textContent = '…'; btn.disabled = true;
  sbFetch('/rest/v1/fortune_sessions?session_code=eq.' + encodeURIComponent(code), {
    method: 'PATCH',
    body: JSON.stringify({status:'unlocked'}),
    headers: { 'Prefer': 'return=representation' }
  }).then(function(r){ return r.json(); }).then(function(){
    var card = document.getElementById('card_' + code);
    if (card) card.classList.add('just-unlocked');
    btn.textContent = '已解锁 ✓'; btn.classList.add('unlocked');
    setTimeout(loadSessions, 1500);
  }).catch(function(){
    btn.textContent = '重试'; btn.disabled = false;
    alert('解锁失败，请重试');
  });
}

function playBeep() {
  if (!beepOk) return;
  try {
    var ctx = new (window.AudioContext||window.webkitAudioContext)();
    var osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880; osc.type = 'sine'; gain.gain.value = 0.2;
    osc.start();
    setTimeout(function(){ osc.frequency.value=1100; setTimeout(function(){osc.stop();},150); }, 100);
  } catch(_) {}
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('soundBtn').textContent = soundEnabled ? '🔊 声音开' : '🔇 声音关';
}

function scrollToCode(code) {
  var card = document.getElementById('card_' + code);
  if (card) {
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    card.style.borderColor = 'var(--gold)';
    card.style.boxShadow = '0 0 20px rgba(201,169,110,0.3)';
  }
}
</script>
</body>
</html>
