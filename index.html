<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>四柱八字 · 命理排盘</title>
<style>
:root {
  --bg: #1a0a0a;
  --card: #2a1215;
  --gold: #c9a96e;
  --gold-light: #e0d0a0;
  --red: #8b1a1a;
  --text: #d4c5b0;
  --text-dim: #a09080;
  --text-light: #f0e8d8;
  --border: #3a2820;
  --wood: #5a8a3c;
  --fire: #c0392b;
  --earth: #c9a050;
  --metal: #d4c080;
  --water: #3a6a9a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  background-image: radial-gradient(ellipse at 50% 0%, #2a1015 0%, #1a0a0a 60%);
  color: var(--text);
  font-family: "Microsoft YaHei","PingFang SC","Hiragino Sans GB",sans-serif;
  min-height: 100vh;
  line-height: 1.8;
}
.header {
  text-align: center;
  padding: 36px 20px 24px;
  position: relative;
}
.header::after {
  content: '';
  display: block;
  width: 60px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 16px auto 0;
}
.header h1 {
  font-size: 2em;
  color: var(--gold-light);
  letter-spacing: 0.15em;
  font-weight: normal;
}
.header .sub {
  color: var(--text-dim);
  font-size: 0.9em;
  letter-spacing: 0.2em;
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 28px 24px;
  margin: 0 auto 16px;
  max-width: 540px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
}
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  color: var(--text-dim);
  font-size: 0.85em;
  margin-bottom: 4px;
  letter-spacing: 0.05em;
}
.form-group input, .form-group select {
  width: 100%;
  padding: 10px 14px;
  background: #1a0d0f;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-light);
  font-size: 1em;
  font-family: inherit;
  transition: border-color 0.3s;
}
.form-group input:focus, .form-group select:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(201,169,110,0.1);
}
.form-row { display: flex; gap: 12px; }
.form-row > * { flex: 1; }
.btn {
  width: 100%;
  padding: 14px;
  font-size: 1.1em;
  letter-spacing: 0.1em;
  background: linear-gradient(135deg, #8b1a1a 0%, #6b1010 100%);
  color: var(--gold-light);
  border: 1px solid var(--gold);
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.3s;
  margin-top: 8px;
}
.btn:hover {
  background: linear-gradient(135deg, #a02020 0%, #8b1a1a 100%);
  box-shadow: 0 0 20px rgba(201,169,110,0.2);
}
.btn-print {
  background: transparent;
  border: 1px solid var(--text-dim);
  color: var(--text-dim);
  margin-top: 8px;
}
.btn-print:hover {
  border-color: var(--gold);
  color: var(--gold-light);
}

/* Bazi table */
.bazi-table {
  width: 100%;
  border-collapse: collapse;
  text-align: center;
  margin: 16px 0;
}
.bazi-table th {
  color: var(--text-dim);
  font-weight: normal;
  font-size: 0.8em;
  padding: 6px 0;
  letter-spacing: 0.05em;
}
.bazi-table td {
  padding: 10px 8px;
  font-size: 1.4em;
  color: var(--text-light);
  border: 1px solid var(--border);
}
.bazi-table .stem { color: var(--gold-light); font-size: 1.5em; }
.bazi-table .branch { color: var(--text-dim); font-size: 1em; }
.bazi-table .sub { font-size: 0.7em; color: var(--text-dim); }

.gods-row td {
  font-size: 0.85em;
  color: var(--gold);
  padding: 4px 6px;
  letter-spacing: 0.05em;
}

/* Five elements */
.elements {
  display: flex;
  gap: 8px;
  margin: 16px 0;
}
.elem-bar { flex: 1; text-align: center; }
.elem-bar .fill {
  height: 8px;
  border-radius: 4px;
  margin-bottom: 4px;
  transition: width 0.6s;
}
.elem-bar .label { font-size: 0.75em; color: var(--text-dim); }
.elem-bar .count { font-size: 0.85em; color: var(--text-light); }
.wood-fill { background: var(--wood); }
.fire-fill { background: var(--fire); }
.earth-fill { background: var(--earth); }
.metal-fill { background: var(--metal); }
.water-fill { background: var(--water); }

/* Day Master */
.day-master {
  text-align: center;
  padding: 20px;
  background: #1a0d0f;
  border-radius: 6px;
  margin: 12px 0;
}
.day-master .char { font-size: 3em; color: var(--gold-light); }
.day-master .desc { color: var(--text-dim); margin-top: 8px; font-size: 0.9em; }

.section-title {
  color: var(--gold);
  font-size: 0.85em;
  letter-spacing: 0.1em;
  border-left: 3px solid var(--gold);
  padding-left: 12px;
  margin: 0 0 8px;
}

/* Luck pillars */
.luck-list {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 8px 0;
}
.luck-item {
  flex: 0 0 auto;
  min-width: 80px;
  text-align: center;
  padding: 8px 12px;
  background: #1a0d0f;
  border-radius: 6px;
  border: 1px solid var(--border);
}
.luck-item.current {
  border-color: var(--gold);
  background: #2a1815;
}
.luck-item .age { font-size: 0.7em; color: var(--text-dim); }
.luck-item .pillar { font-size: 1.2em; color: var(--gold-light); }

/* Fortune message */
.fortune-msg {
  line-height: 2.2;
  font-size: 0.95em;
}
.fortune-msg .highlight {
  color: var(--gold-light);
  font-weight: bold;
}
.fortune-msg .tag {
  display: inline-block;
  padding: 1px 8px;
  margin: 2px;
  background: #1a0d0f;
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--gold);
  font-size: 0.85em;
}

.analysis-block {
  background: #1a0d0f;
  border-radius: 6px;
  padding: 16px;
  margin: 12px 0;
  border-left: 3px solid var(--gold);
}
.analysis-block .title {
  color: var(--gold-light);
  font-size: 0.9em;
  margin-bottom: 6px;
}

/* Current luck highlight */
.luck-highlight {
  display: inline-block;
  padding: 2px 10px;
  background: rgba(201,169,110,0.15);
  border-radius: 3px;
  color: var(--gold-light);
}

.hidden { display: none; }

@keyframes fadeUp {
  from { opacity:0; transform: translateY(20px); }
  to { opacity:1; transform: translateY(0); }
}
.result-card { animation: fadeUp 0.6s ease-out; }

@media print {
  body { background: white; color: #222; }
  .card { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  .header::after { display: none; }
  .header h1 { color: #333; }
  .btn, .btn-print { display: none; }
  .bazi-table .stem { color: #333; }
  .bazi-table .branch { color: #666; }
  .day-master .char { color: #333; }
  .analysis-block, .luck-item { background: #f9f6f0; border-color: #ddd; }
  #inputCard { display: none; }
}

.footer {
  text-align: center;
  padding: 24px;
  color: var(--text-dim);
  font-size: 0.75em;
}

/* ── Payment QR ── */
.qr-wrapper {
  width: 200px; height: 200px;
  margin: 0 auto;
  border: 2px dashed var(--border);
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  transition: border-color 0.3s;
}
.qr-wrapper:hover { border-color: var(--gold); }
.qr-img {
  width: 100%; height: 100%;
  object-fit: contain;
}
.qr-placeholder {
  position: absolute; inset: 0;
  display: flex;
  align-items: center; justify-content: center;
  background: #1a0d0f;
  pointer-events: none;
}
.qr-placeholder-text {
  color: var(--text-dim);
  font-size: 0.85em;
  line-height: 1.8;
}
.btn-mini {
  padding: 6px 18px;
  font-size: 0.8em;
  background: transparent;
  color: var(--text-dim);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.3s;
}
.btn-mini:hover {
  border-color: var(--gold);
  color: var(--gold-light);
}

@media print {
  .qr-placeholder { display: none !important; }
  .btn-mini { display: none; }
  #payCard { border: 1px solid #ccc; }
  #payCard .section-title { color: #333; }
  #paywallCard { display: none !important; }
}

/* ── Paywall ── */
#paywallCard {
  text-align: center;
  border-color: var(--gold);
}
.paywall-icon {
  font-size: 2.5em;
  color: var(--gold);
  margin-bottom: 4px;
}
.paywall-title {
  color: var(--gold-light);
  font-size: 1.1em;
  margin: 8px 0;
  letter-spacing: 0.05em;
}
.paywall-teaser {
  background: #1a0d0f;
  border-radius: 6px;
  padding: 16px;
  margin: 16px 0;
  color: var(--text-dim);
  font-size: 0.9em;
  line-height: 2;
}
.paywall-teaser .teaser-highlight {
  color: var(--gold-light);
  font-size: 1.1em;
}
.paywall-unlock {
  display: flex;
  gap: 8px;
  max-width: 260px;
  margin: 16px auto 0;
}
.paywall-unlock input {
  flex: 1;
  padding: 10px 12px;
  background: #1a0d0f;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-light);
  font-size: 1em;
  font-family: inherit;
  text-align: center;
  letter-spacing: 0.3em;
}
.paywall-unlock input:focus {
  outline: none;
  border-color: var(--gold);
}
.paywall-unlock .btn-unlock {
  padding: 10px 16px;
  background: linear-gradient(135deg, #8b1a1a 0%, #6b1010 100%);
  color: var(--gold-light);
  border: 1px solid var(--gold);
  border-radius: 4px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.9em;
  white-space: nowrap;
}
.paywall-hint {
  color: var(--text-dim);
  font-size: 0.7em;
  margin-top: 10px;
}
.paywall-hint a {
  color: var(--text-dim);
  text-decoration: underline;
  cursor: pointer;
}
#paywallError {
  color: #c0392b;
  font-size: 0.8em;
  margin-top: 6px;
  min-height: 1.2em;
}

/* Spinner */
.waiting-spinner {
  width: 32px; height: 32px;
  margin: 0 auto;
  border: 3px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.unlock-waiting {}
.unlock-done {}
#sessionCodeDisplay { user-select: all; }
  #sessionCodeDisplay { user-select: all; }
</style>
<script>
/* Supabase REST API 封装（兼容写法，支持所有浏览器） */
var SB_URL = 'https://qvxqapgeeldfzedpcihd.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF2eHFhcGdlZWxkZnplZHBjaWhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzgxNDYsImV4cCI6MjA5NzAxNDE0Nn0.isNFaHKFTLZc6Im2obBKawczsooeImVkI4lfhmUfTfw';

function sbFetch(path, opts) {
  var h = {
    'apikey': SB_KEY,
    'Authorization': 'Bearer ' + SB_KEY,
    'Content-Type': 'application/json'
  };
  if (opts && opts.headers) {
    for (var k in opts.headers) { h[k] = opts.headers[k]; }
  }
  var fetchOpts = { headers: h };
  if (opts && opts.method) fetchOpts.method = opts.method;
  if (opts && opts.body) fetchOpts.body = opts.body;
  return fetch(SB_URL + path, fetchOpts);
}

function sbInsert(table, data) {
  return sbFetch('/rest/v1/' + table, {
    method: 'POST',
    body: JSON.stringify(data),
    headers: { 'Prefer': 'return=representation' }
  }).then(function(r){ return r.json(); });
}

function sbUpdate(table, column, value, data) {
  return sbFetch('/rest/v1/' + table + '?' + encodeURIComponent(column) + '=eq.' + encodeURIComponent(value), {
    method: 'PATCH',
    body: JSON.stringify(data),
    headers: { 'Prefer': 'return=representation' }
  }).then(function(r){ return r.json(); });
}

function sbSelect(table) {
  return sbFetch('/rest/v1/' + table + '?order=created_at.desc&limit=20', {
    headers: { 'Prefer': 'return=representation' }
  }).then(function(r){ return r.json(); });
}

// 轮询检查订单状态
var _pollTimer = null;
function startStatusPolling(code) {
  if (_pollTimer) { clearInterval(_pollTimer); }
  _pollTimer = setInterval(function(){
    sbFetch('/rest/v1/fortune_sessions?session_code=eq.' + encodeURIComponent(code))
      .then(function(r){ return r.json(); })
      .then(function(rows){
        if (rows && rows.length > 0 && rows[0].status === 'unlocked') {
          clearInterval(_pollTimer);
          _pollTimer = null;
          onUnlocked();
        }
      })
      .catch(function(){});
  }, 5000);
}
</script>

<body>

<div class="header">
  <h1>四 柱 八 字</h1>
  <div class="sub">命 理 排 盘</div>
</div>

<!-- ═══════════ INPUT ═══════════ -->
<div class="card" id="inputCard">
  <div class="form-group">
    <label>姓名</label>
    <input type="text" id="name" placeholder="输入姓名（可留空）">
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>公历生日</label>
      <input type="date" id="birthDate" value="2000-01-01">
    </div>
    <div class="form-group">
      <label>出生时辰</label>
      <select id="birthHour">
        <option value="-1">时辰不详</option>
        <option value="0">子时 23:00-01:00</option>
        <option value="1">丑时 01:00-03:00</option>
        <option value="2">寅时 03:00-05:00</option>
        <option value="3">卯时 05:00-07:00</option>
        <option value="4">辰时 07:00-09:00</option>
        <option value="5">巳时 09:00-11:00</option>
        <option value="6" selected>午时 11:00-13:00</option>
        <option value="7">未时 13:00-15:00</option>
        <option value="8">申时 15:00-17:00</option>
        <option value="9">酉时 17:00-19:00</option>
        <option value="10">戌时 19:00-21:00</option>
        <option value="11">亥时 21:00-23:00</option>
      </select>
    </div>
  </div>
  <div class="form-group">
    <label>性别</label>
    <select id="gender">
      <option value="male">男</option>
      <option value="female">女</option>
    </select>
  </div>
  <button class="btn" onclick="doReading()">🔮 开 始 排 盘</button>
</div>

<!-- ═══════════ RESULT ═══════════ -->
<div id="resultArea" class="hidden">

  <!-- 🔒 付费解锁墙 -->
  <div class="card" id="paywallCard">
    <div class="paywall-icon">🔒</div>
    <div class="paywall-title">支 付 后 解 锁 完 整 命 盘</div>

    <!-- 预览 -->
    <div class="paywall-teaser" id="paywallTeaser">
      <div class="teaser-highlight" id="teaserLine"></div>
      <div id="teaserSub"></div>
    </div>

    <!-- 收款码 -->
    <div class="section-title" style="display:inline-block;margin-bottom:8px;">微信扫码支付</div>
    <div class="qr-wrapper" id="qrWrapper" style="margin:0 auto;">
      <img id="qrImage" src="pay_qr.jpg" alt="收款码" class="qr-img">
    </div>
    <div style="color:var(--text-dim);font-size:0.8em;margin:8px 0;">
      命理分析 · 随缘打赏 · ¥9.90
    </div>
    <div style="color:var(--text-dim);font-size:0.75em;margin:8px 0;border:1px solid var(--border);border-radius:6px;padding:8px;background:rgba(255,255,255,0.03);">
      ⚠️ 扫码付款后，点击下方「我已付款」按钮<br>
      摊主确认后自动解锁完整命盘
    </div>

    <!-- ══════ 我已付款 + 远程解锁 ══════ -->
    <div style="margin-top:20px;border-top:1px solid var(--border);padding-top:16px;">

      <!-- 我已付款按钮 (顾客触发) -->
      <div id="paywallPaidSection">
        <button class="btn" id="btnPaid" onclick="notifyPaid()"
          style="max-width:280px;margin:0 auto;font-size:1em;padding:12px;">
          💰 我 已 付 款
        </button>
        <div style="color:var(--text-dim);font-size:0.7em;margin-top:6px;">
          点击后通知摊主解锁 · <span id="paidSessionCode" style="color:var(--gold);font-family:monospace;">---</span>
        </div>
        <div id="paidStatus" style="font-size:0.8em;margin-top:8px;min-height:1.2em;"></div>
      </div>

      <!-- 摊主远程解锁等待 -->
      <div class="unlock-waiting hidden" id="unlockWaiting">
        <div class="waiting-spinner"></div>
        <div style="color:var(--gold-light);margin:8px 0;">等待摊主确认支付…</div>
        <div style="color:var(--text-dim);font-size:0.7em;">命盘将在解锁后自动显示</div>
        <div style="color:var(--text-dim);font-size:0.65em;margin-top:6px;">
          会话编号: <span id="sessionCodeDisplay" style="color:var(--gold);font-family:monospace;">---</span>
        </div>
      </div>

      <!-- 已解锁 -->
      <div class="unlock-done hidden" id="unlockDone">
        <div style="color:var(--green);font-size:1.2em;">✅ 支付已确认，命盘已解锁</div>
      </div>

      <div id="paywallError"></div>
    </div>
  </div>

  <!-- ═══════ 以下为完整命盘（解锁后显示） ═══════ -->
  <div id="fullResults" class="hidden">

  <!-- 八字表 + 十神 -->
  <div class="card result-card">
    <div class="section-title">八字排盘 · 十神</div>
    <div style="text-align:center;color:var(--text-dim);margin-top:8px;">
      <span id="resultName"></span> · <span id="resultDate"></span> · <span id="resultGender"></span>
    </div>
    <table class="bazi-table">
      <thead>
        <tr><th>年柱</th><th>月柱</th><th>日柱</th><th>时柱</th></tr>
      </thead>
      <tbody>
        <tr>
          <td><span class="stem" id="yStem"></span><br><span class="branch" id="yBranch"></span></td>
          <td><span class="stem" id="mStem"></span><br><span class="branch" id="mBranch"></span></td>
          <td><span class="stem" id="dStem"></span><br><span class="branch" id="dBranch"></span></td>
          <td><span class="stem" id="hStem"></span><br><span class="branch" id="hBranch"></span></td>
        </tr>
        <tr class="gods-row">
          <td id="yGod"></td><td id="mGod"></td><td id="dGod">日主</td><td id="hGod"></td>
        </tr>
        <tr>
          <td class="sub" id="yExtra"></td>
          <td class="sub" id="mExtra"></td>
          <td class="sub" id="dExtra"></td>
          <td class="sub" id="hExtra"></td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- 日主 + 旺衰 -->
  <div class="card result-card">
    <div class="section-title">日主 · 旺衰</div>
    <div class="day-master">
      <div class="char" id="dmChar"></div>
      <div class="desc" id="dmDesc"></div>
    </div>
    <div class="analysis-block" id="strengthBlock"></div>
  </div>

  <!-- 五行 -->
  <div class="card result-card">
    <div class="section-title">五行分布</div>
    <div class="elements" id="elemsChart"></div>
    <div style="text-align:center;color:var(--text-dim);font-size:0.85em;margin-top:8px;" id="elemsMsg"></div>
  </div>

  <!-- 大运 -->
  <div class="card result-card">
    <div class="section-title">大运流年</div>
    <div class="luck-list" id="luckList"></div>
    <div style="text-align:center;color:var(--text-dim);font-size:0.8em;margin-top:8px;" id="luckNote"></div>
  </div>

  <!-- 命理简评 -->
  <div class="card result-card">
    <div class="section-title">命理简评</div>
    <div class="fortune-msg" id="fortuneMsg"></div>
  </div>

  <!-- 详批 -->
  <div class="card result-card" id="aiCard" style="display:none;">
    <div class="section-title">📜 详批</div>
    <div class="fortune-msg" id="aiReading"></div>
    <div style="text-align:center;color:var(--text-dim);font-size:0.75em;margin-top:8px;" id="aiStatus"></div>
  </div>

  <div style="max-width:540px;margin:0 auto;">
    <button class="btn" onclick="doReset()">↩ 重新排盘</button>
    <button class="btn btn-print" onclick="window.print()">🖨 打印命单</button>
  </div>

}

function analyzeStrength(dmStem, monthBranch, allStems, allBranches) {
  const dmElem = STEM_ELEM[dmStem];
  let score = 3; // start at neutral (3 = balanced, range 0..9)
  const details = [];

  // 1. 得令 (月令 seasonal command) — most important, weight ±2
  const monthElem = BR_ELEM[monthBranch];
  if (monthElem === dmElem) {
    score += 2;
    details.push('得令（月令为' + E_NAMES[dmElem] + '，当权得时）');
  } else if (GEN[monthElem] === dmElem) {
    score += 1;
    details.push('相令（月令' + E_NAMES[monthElem] + '生' + E_NAMES[dmElem] + '，得月令生扶）');
  } else if (GEN[dmElem] === monthElem) {
    score -= 1;
    details.push('泄令（日主' + E_NAMES[dmElem] + '生月令' + E_NAMES[monthElem] + '，气泄于月）');
  } else if (CON[monthElem] === dmElem) {
    score -= 2;
    details.push('失令（月令' + E_NAMES[monthElem] + '克' + E_NAMES[dmElem] + '，不得天时）');
  }

  // 2. 得地 (branch root support): count same-element and generating branches
  // Day branch counts ×2 (it's the 婚姻宫/sitting branch, direct root)
  let branchSupport = 0;
  allBranches.forEach((b, i) => {
    const w = i === 2 ? 2 : 1; // day branch weight ×2
    if (BR_ELEM[b] === dmElem) branchSupport += w;
    else if (GEN[BR_ELEM[b]] === dmElem) branchSupport += w * 0.5; // branch generates DM = partial support
  });
  score += Math.round(branchSupport);
  if (branchSupport >= 3) details.push('得地（地支有强根，根基稳固）');
  else if (branchSupport >= 1.5) details.push('通根（地支有' + E_NAMES[dmElem] + '根，尚可支撑）');
  else details.push('虚浮（地支无' + E_NAMES[dmElem] + '根，根基较浅）');

  // 3. 得助 (stem support): count same-element stems excluding DM
  let stemSupport = 0;
  allStems.forEach((s, i) => {
    if (i !== 2 && STEM_ELEM[s] === dmElem) stemSupport++;
  });
  score += stemSupport;
  if (stemSupport >= 2) details.push('得助（天干比劫多，助力充足）');
  else if (stemSupport === 1) details.push('微助（天干有1比劫，略有帮衬）');
  else details.push('无助（天干无比劫，独立支撑）');

  // 4. Count opposing forces (克 + 泄 + 耗) for descriptive detail
  let opposeCount = 0;
  allStems.forEach((s, i) => {
    if (i !== 2) {
      if (CON[STEM_ELEM[s]] === dmElem) opposeCount++; // 克我
      if (GEN[dmElem] === STEM_ELEM[s]) opposeCount++; // 泄我
      if (CON[dmElem] === STEM_ELEM[s]) opposeCount++; // 耗我
    }
  });

  else if (score >= 1) { level = 'weak'; label = '中和偏弱'; }
  else { level = 'weak'; label = '身弱'; }

  return { score, level, label, details };
}

// Helper: find element that generates `elem` (生我者) or controls `elem` (克我者)

  return -1;
}
function findController(elem) {
  for (let i = 0; i < 5; i++) if (CON[i] === elem) return i;

}

// Determine 喜用神 / 忌神 from strength level
function favorableElements(level, dmElem) {
  // 身强: 喜克泄耗 (control, drain, exhaust)

  let favorable = [], unfavorable = [];

                 E_NAMES[GEN[dmElem]],             // 我生者 = 食伤
                 E_NAMES[CON[dmElem]]];            // 我克者 = 财
    unfavorable = [E_NAMES[dmElem],                // 同我者 = 比劫
                   E_NAMES[findGenerator(dmElem)]];// 生我者 = 印星
  } else if (level === 'weak') {
    // 喜: 生我(印星) + 同我(比劫)
    favorable = [E_NAMES[findGenerator(dmElem)],   // 生我者 = 印星
                 E_NAMES[dmElem]];                  // 同我者 = 比劫

                   E_NAMES[GEN[dmElem]]];           // 泄我者 = 食伤

    // 中和: 优先补缺的五行
    favorable = [E_NAMES[dmElem], E_NAMES[findGenerator(dmElem)]];
    unfavorable = [E_NAMES[findController(dmElem)]];
  }
  return { favorable, unfavorable };
}

// ═══════════════ CORE PILLAR CALCULATION ═══════════════

function getSolarTermMonth(month, day) {
  if (month === 1) return day >= 6 ? 1 : 0;
  if (month === 2 && day < 4) return 1;
  let br = 2;
  for (const t of SOLAR_TERMS) {
    if (t.m === 1) continue;
    if (month > t.m || (month === t.m && day >= t.d)) br = t.br;
  }
  return br;
}

function getYearPillar(year, month, day) {
  const actualYear = (month < 2 || (month === 2 && day < 4)) ? year - 1 : year;
  return {
    stem: (((actualYear - 4) % 10) + 10) % 10,
    branch: (((actualYear - 4) % 12) + 12) % 12
  };
}

function getMonthPillar(yearStem, month, day) {
  const branchIdx = getSolarTermMonth(month, day);
  const pos = (branchIdx + 10) % 12;
  const stemIdx = (yearStem * 2 + 2 + pos) % 10;
  return { stem: stemIdx, branch: branchIdx };
}

// Reference: 2000-01-01 = 戊午 (stem 4, branch 6)
function getDayPillar(year, month, day) {
  const ref = Date.UTC(2000, 0, 1);
  const target = Date.UTC(year, month - 1, day);
  const diffDays = Math.round((target - ref) / 86400000);
  return {
    stem: (((4 + diffDays) % 10) + 10) % 10,
    branch: (((6 + diffDays) % 12) + 12) % 12
  };
}

function getHourPillar(dayStem, hourBranch) {
  return { stem: (dayStem * 2 + hourBranch) % 10, branch: hourBranch };
}

function getLuckPillars(yearStem, monthStem, monthBranch, gender) {
  const yangYY = STEM_YY[yearStem] === 1;
  const isMale = gender === 'male';
  const forward = (yangYY && isMale) || (!yangYY && !isMale);
  const pillars = [];
  for (let i = 0; i < 8; i++) {
    const step = forward ? i + 1 : -(i + 1);
    const brIdx = (((monthBranch + step) % 12) + 12) % 12;
    const stIdx = (((monthStem + step) % 10) + 10) % 10;
    pillars.push({ age: i * 10 + 1, stem: stIdx, branch: brIdx });
  }
  return pillars;
}

  const year2026Stem = 2; // 丙
  const year2026Branch = 6; // 午
  const yearGod = tenGod(dmStem, year2026Stem);
  const yearGodName = GOD_NAMES[yearGod];

  let yearText = '2026丙午年，天干丙火透出为' + yearGodName + '（' + GOD_MEANING[yearGodName] + '），';
  const yearElem = E_NAMES[STEM_ELEM[year2026Stem]];
  if (favs.favorable.includes(yearElem)) {
    yearText += '丙午为喜用之年，今年运势上扬，适合主动出击。';
  } else if (favs.unfavorable.includes(yearElem)) {
    yearText += '丙午为忌神之年，今年宜保守行事，避免重大决策。';
  } else {
    yearText += '今年运势平稳，稳中求进即可。';
  }

  // Check branch interactions with year
  if (year2026Branch === dayBranch) {
    yearText += '流年地支与日支伏吟（午午自刑），情绪波动较大，注意调整心态。';
  }
  if (branchClash(year2026Branch, allBranches[1])) {
    yearText += '午火冲月支' + BRANCHES[allBranches[1]] + '，事业或家庭有变动迹象。';
  }
  if (branchClash(year2026Branch, dayBranch)) {
    yearText += '流年冲婚姻宫，感情或居住环境有变动。';
  }
  sections.push(yearText);

  return sections.join('\n\n');
}

  // Show paywall with "我已付款" button (default)

function esc(s) {
  s = String(s || '');
  s = s.replace(/&/g, '&amp;');
  s = s.replace(/</g, '&lt;');
  s = s.replace(/>/g, '&gt;');
  s = s.replace(/"/g, '&quot;');
  return s;
}

function uploadQR(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = document.getElementById('qrImage');
    img.src = e.target.result;
    img.style.display = '';
    document.getElementById('qrPlaceholder').style.display = 'none';
    // Save to localStorage for persistence
    try { localStorage.setItem('fortune_qr', e.target.result); } catch(_) {}
  };
  reader.readAsDataURL(file);
}

    + '- 语言要专业且有温度，避免过于迷信的表述\n'
    + '- 每条分析要有具体事实依据（从八字推导），不要泛泛而谈\n'
    + '- 总计800-1200字\n'
    + '- 使用中文，段落分明';

  // 调DeepSeek API
  fetch('https://api.deepseek.com/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + DEEPSEEK_KEY
    },
    body: JSON.stringify({
      model: 'deepseek-chat',
      messages: [
        {role: 'system', content: '你是一位资深中国传统八字命理师，精通子平术。你用专业且平实的语言分析八字命盘，给出有价值的命理建议。'},
        {role: 'user', content: prompt}
      ],
      max_tokens: 2048,
      temperature: 0.7
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(result){
    if (result && result.choices && result.choices[0]) {
      var text = result.choices[0].message.content;
      // 格式化输出：段落之间加空行
      text = text.replace(/\n\n/g, '</p><p style="margin-bottom:14px;">');
      text = '<p style="margin-bottom:14px;">' + text + '</p>';
      document.getElementById('aiReading').innerHTML = text;
      document.getElementById('aiStatus').textContent = '✅ AI分析完成';
    } else {
      document.getElementById('aiStatus').textContent = '⚠ AI分析暂不可用，请重试';
    }
  })
  .catch(function(err){
    document.getElementById('aiStatus').textContent = '⚠ AI分析加载失败，请刷新重试';
    console.warn('AI分析失败:', err);
  });
}

// 辅助：获取十神
function getBaziGod(dmStem, otherStem) {
  var diff = (otherStem - dmStem + 10) % 10;
  var godMap = [
    '比肩','劫财','食神','伤官','正财','偏财','正官','七杀','正印','偏印'
  ];
  return godMap[diff];
}
